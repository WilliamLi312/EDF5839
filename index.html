<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Type Test</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { margin: 10px; padding: 10px 20px; font-size: 16px; }
.result-card { 
  max-width: 500px; 
  margin: 20px auto; 
  padding: 20px; 
  border: 2px solid #ddd; 
  border-radius: 10px;
}
.result-image { 
  width: 200px; 
  height: 200px; 
  margin: 20px auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎮 Teacher Type Test</h1>
<div id="quiz"></div>
<div id="result"></div>

<script>
const questions = [
"1. A student is talking while you are teaching. What do you do?",
"2. A student forgets homework.",
"3. A student is upset in class.",
"4. Your classroom management style is:",
"5. A student breaks a rule.",
"6. Students are noisy during group work.",
"7. You prefer lessons to be:",
"8. A student is struggling academically.",
"9. You react to late submissions by:",
"10. A student challenges your authority.",
"11. Classroom rules should be:",
"12. A student is distracted.",
"13. You deal with conflict by:",
"14. You see your role as:",
"15. Students respect you because:",
"16. When giving feedback:",
"17. You handle misbehavior by:",
"18. You prioritise:",
"19. Your classroom atmosphere is:",
"20. Your ideal student is:"
];

const options = [
["Give a warning", "Ignore and continue", "Silent stare", "Talk after class"],
["Give penalty", "Accept excuse", "Look disappointed", "Help them catch up"],
["Send them out", "Comfort them", "Observe quietly", "Solve the issue"],
["Strict and controlled", "Relaxed and caring", "Quiet but firm", "Supportive and practical"],
["Immediate consequence", "Give second chance", "Non-verbal warning", "Discuss solution"],
["Stop and discipline", "Let it continue", "Use eye contact", "Redirect activity"],
["Structured", "Flexible", "Calm", "Interactive"],
["Push them harder", "Encourage gently", "Watch silently", "Provide strategies"],
["Strict deadline", "Flexible deadline", "Silent judgement", "Offer support"],
["Assert authority", "Stay calm", "Use stare", "Resolve calmly"],
["Clear and strict", "Flexible", "Implied", "Practical"],
["Call them out", "Let it go", "Stare", "Help refocus"],
["Enforce rules", "Keep peace", "Stay silent", "Fix problem"],
["Authority figure", "Friend/mentor", "Observer", "Problem-solver"],
["You are strict", "You are kind", "You are intimidating", "You are helpful"],
["Direct and critical", "Positive and gentle", "Minimal", "Constructive"],
["Punish", "Forgive", "Stare", "Guide"],
["Discipline", "Wellbeing", "Control", "Improvement"],
["Orderly", "Warm", "Quiet", "Supportive"],
["Follows rules", "Happy and comfortable", "Quiet", "Improving"]
];

let index = 0;
let scores = {
  Enforcer: 0,
  Softie: 0,
  Stare: 0,
  Fixer: 0
};

function showQuestion() {
  if(index >= questions.length){
    showResult();
    return;
  }

  let html = `<h2>${questions[index]}</h2>`;
  ["A","B","C","D"].forEach((letter, i) => {
    html += `<button onclick="choose('${letter}')">${letter}. ${options[index][i]}</button><br>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function choose(letter){
  if(letter === "A") scores.Enforcer++;
  if(letter === "B") scores.Softie++;
  if(letter === "C") scores.Stare++;
  if(letter === "D") scores.Fixer++;

  index++;
  showQuestion();
}

function showResult(){
  let maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

  let results = {
    Enforcer: {
      title: "🚨 The Enforcer",
      description: "You are strict, rule-focused, and maintain strong discipline.",
      image: "enforcer.jpg"
    },
    Softie: {
      title: "💖 The Softie",
      description: "You are caring, flexible, and prioritise student wellbeing.",
      image: "softie.jpg"
    },
    Stare: {
      title: "👀 The Stare",
      description: "You control the class with presence and silent authority.",
      image: "Stare.jpg"
    },
    Fixer: {
      title: "🛠️ The Fixer",
      description: "You solve problems and support students practically.",
      image: "fixer.jpg"
    }
  };

  let result = results[maxType];
  let html = `
    <div class="result-card">
      <img src="${result.image}" alt="${maxType}" class="result-image">
      <h2>${result.title}</h2>
      <p>${result.description}</p>
    </div>
  `;

  document.getElementById("quiz").innerHTML = "";
  document.getElementById("result").innerHTML = html;
}

showQuestion();
</script>

</body>
</html>
