<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Personality Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* APP CONTAINER */
.app {
  width: 380px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* BUTTON */
button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  background: #f2f2f2;
  transition: 0.2s;
}

button:hover {
  background: #dfe6ff;
  transform: scale(1.02);
}

/* RESULT CARD */
.result-card {
  max-width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.result-image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 10px;
}

h1 { font-size: 22px; }
h2 { font-size: 16px; }

</style>
</head>

<body>

<div class="app">

  <!-- 🟢 HOME PAGE -->
  <div id="home">
    <h1>🎓 Teacher Personality Test</h1>

    <p>Discover your teaching personality type.</p>

    <p>
      🚨 Enforcer<br>
      💖 Softie<br>
      👀 Stare<br>
      🛠️ Fixer
    </p>

    <button onclick="startQuiz()">Start Test</button>
  </div>

  <!-- 🟡 QUIZ -->
  <div id="quiz" style="display:none;"></div>

  <!-- 🟣 RESULT -->
  <div id="result"></div>

</div>

<script>

const questions = [
"1. A student still hasn’t handed in their homework. You…",
"2. The class goes completely silent after you ask a question. You…",
"3. Two students in the back are having a full podcast episode. You…",
"4. A student asks, “Do we actually need to know this?” You…",
"5. A parent emails you at 10:47 pm. You…",
"6. The projector stops working during an observation. You…",
"7. A student asks to go to the toilet five minutes into class. You…",
"8. Group work starts, and one student immediately becomes decorative. You…",
"9. Halfway through the lesson, you realise nobody knows what’s going on. You…",
"10. You catch a student on their phone in class. You…",
"11. There’s an observation tomorrow and your lesson still feels messy. You…",
"12. A student gives an answer so off-topic it feels like experimental theatre. You…",
"13. The class has the energy of a haunted waiting room. You…",
"14. A student apologises and says they’re really trying. You…",
"15. At the end of a long day, someone says, “Quick question…” You…",
"16. A lesson goes badly. Your first thought is…",
"17. A student keeps testing boundaries. You…",
"18. You’re covering a class you’ve never taught before. You…",
"19. It’s one of those weeks. Your survival strategy is…",
"20. Your classroom presence is best described as…"
];

const options = [
["deliver a courtroom speech on responsibility that could briefly qualify as public policy",
"say, “Okay, what’s going on?” like this isn’t your fourth emotional rescue mission of the day",
"stare at them until their conscience boots up",
"produce a catch-up sheet, a backup task, and a recovery plan like you’ve been waiting for this nonsense to happen"
],
["start cold-calling like the right to remain silent has been revoked",
"smile kindly and rephrase the question as if the room hasn’t just spiritually abandoned you",
"say, “I can wait,” and let the silence evolve into a sentient being",
"pivot into pair discussion so fast the awkwardness doesn’t have time to put shoes on"
],
["stop the lesson and cancel the production company",
"float over with a gentle “Everything alright over here?” like a deeply tired youth counsellor",
"stand near them and let shame enter the chat",
"assign them a job before episode two gets commissioned"
],
["deliver a monologue so intense it feels like the curriculum has taken human form",
"answer kindly because somewhere inside you, optimism is still on life support",
"pause, because the little menace has a point",
"invent a practical example on the spot and drag the lesson back from the cliff edge"
],
["read the subject line, close the app, and let tomorrow’s contractual hours deal with it",
"reply kindly because your boundaries continue to be theoretical",
"stare into the abyss and draft seventeen responses telepathically",
"identify the actual issue, send a three-line solution, and remove it from active memory"
],

["continue as if this stripped-back approach was your educational vision all along",
"laugh softly, reassure everyone, and keep smiling through the internal house fire",
"look at the projector like betrayal now has a physical form",
"launch Plan B so quickly it looks premeditated"
],

["say no, because this lesson is not becoming a train station",
"say yes, but with the energy of a Victorian mother sending someone to war",
"nod once in a way that still somehow feels like a warning",
"wave them off because this issue is ranking below “printer jam” on today’s crisis list"
],

["assign roles with the speed and authority of someone ending a minor coup",
"gently invite them back into the land of the contributing",
"make eye contact and let them feel judged by history itself",
"restructure the task so freeloading becomes a logistical nightmare"
],

["stop everything because we are not continuing this academic hallucination",
"reassure the class and explain it again like the patron saint of second chances",
"continue calmly while your soul opens a confidential investigation",
"strip the task down to its bones and rebuild it in real time like a classroom mechanic"
],

["deal with it immediately because chaos feeds on hesitation",
"give them a soft disappointed reminder like a kind but exhausted aunt",
"give them a look that says, “Don’t drag me into whatever this is.”",
"redirect them into the task so efficiently the phone loses plot relevance"
],

["rebuild half of it at an hour meant for bad decisions",
"tidy what you can and hope kindness carries the rest",
"stare at the lesson plan until it confesses",
"cut, patch, and keep the lesson alive"
],

["redirect immediately before we lose the plot",
"find something nice to say about it",
"pause and let the room recover",
"grab the one useful idea and save the moment"
],

["tighten the pace and move on",
"warm the room up gently",
"accept the curse and teach through it",
"switch activities before this one fully dies"
],

["accept it, but the consequence stays",
"melt instantly because apparently that still works on you",
"nod like the case is closed, but archived",
"accept it and build a support plan immediately"
],

["stop and answer because standards are standards",
"say, “Of course!” while your soul quietly exits",
"turn slowly like an office ghost",
"solve it in thirty seconds and keep packing"
],

["expectations were not met. noted",
"oh no. did everyone feel awful?",
"interesting. terrible, but interesting",
"right, what broke, and how do I fix it?"
], 

["make the rules clearer than daylight",
"try a calm private conversation",
"watch, wait, and choose your moment",
"change the seat, task, group, and maybe the whole ecosystem"
],

["establish order first, feelings later",
"win them over gently and pray for cooperation",
"walk in calm, unreadable, and slightly ominous",
"scan the room and adapt instantly"
],

["lists, structure, and no public breakdowns",
"kindness, coffee, and silent suffering",
"fewer words, more staring",
"triage, shortcuts, and backup plans"
],

["clear, direct, and deeply “absolutely not”",
"warm, steady, and emotionally available",
"calm, unreadable, and mildly threatening",
"adaptable, competent, and running on caffeine"
]
];

let index = 0;

let scores = {
  Enforcer: 0,
  Softie: 0,
  Stare: 0,
  Fixer: 0
};

function startQuiz(){
  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion(){
  if(index >= questions.length){
    showResult();
    return;
  }

  let html = `<h2>${questions[index]}</h2>`;

  ["A","B","C","D"].forEach((letter,i)=>{
    html += `<button onclick="choose('${letter}')">${letter}. ${options[index][i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function choose(letter){
  if(letter === "A") scores.Enforcer++;
  if(letter === "B") scores.Softie++;
  if(letter === "C") scores.Stare++;
  if(letter === "D") scores.Fixer++;

  index++;
  showQuestion();
}

function showResult(){
  let maxType = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  let results = {
    Enforcer: {
      title: "🚨 The Enforcer",
      description: "I got The Enforcer — apparently my classroom management style is clarity, boundaries, and absolutely no foolishness.",
      image: "enforcer.jpg"
    },
    Softie: {
      title: "💖 The Softie",
      description: "I got The Softie — supportive, forgiving, and one heartfelt apology away from abandoning my own boundaries.",
      image: "softie.jpg"
    },
    Stare: {
      title: "👀 The Stare",
      description: "I got The Stare — apparently my teaching style is eye contact, silence, and consequences that arrive spiritually.",
      image: "Stare.jpg"
    },
    Fixer: {
      title: "🛠️ The Fixer",
      description: "I got The Fixer — apparently my professional niche is rescuing collapsing lessons and making it look almost intentional.",
      image: "fixer.jpg"
    }
  };

  let r = results[maxType];

  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <img src="${r.image}" class="result-image">
      <h2>${r.title}</h2>
      <p>${r.description}</p>
    </div>
  `;
}

</script>

</body>
</html>
