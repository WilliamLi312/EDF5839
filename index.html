<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Personality Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* APP CONTAINER */
.app {
  width: 380px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* BUTTON */
button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  background: #f2f2f2;
  transition: 0.2s;
}

button:hover {
  background: #dfe6ff;
  transform: scale(1.02);
}

/* RESULT CARD */
.result-card {
  max-width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.result-image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 10px;
}

h1 { font-size: 22px; }
h2 { font-size: 16px; }

</style>
</head>

<body>

<div class="app">

  <!-- 🟢 HOME PAGE -->
  <div id="home">
    <h1>🎓 Teacher Personality Test</h1>

    <p>Discover your teaching personality type.</p>

    <p>
      🚨 Enforcer<br>
      💖 Softie<br>
      👀 Stare<br>
      🛠️ Fixer
    </p>

    <button onclick="startQuiz()">Start Test</button>
  </div>

  <!-- 🟡 QUIZ -->
  <div id="quiz" style="display:none;"></div>

  <!-- 🟣 RESULT -->
  <div id="result"></div>

</div>

<script>

const questions = [
"1. A student is talking while you are teaching. What do you do?",
"2. A student forgets homework.",
"3. A student is upset in class.",
"4. Your classroom management style is:",
"5. A student breaks a rule.",
"6. Students are noisy during group work.",
"7. You prefer lessons to be:",
"8. A student is struggling academically.",
"9. You react to late submissions by:",
"10. A student challenges your authority.",
"11. Classroom rules should be:",
"12. A student is distracted.",
"13. You deal with conflict by:",
"14. You see your role as:",
"15. Students respect you because:",
"16. When giving feedback:",
"17. You handle misbehavior by:",
"18. You prioritise:",
"19. Your classroom atmosphere is:",
"20. Your ideal student is:"
];

const options = [
["Warning", "Ignore", "Silent stare", "Talk later"],
["Penalty", "Excuse", "Disappointed", "Help"],
["Send out", "Comfort", "Observe", "Solve"],
["Strict", "Relaxed", "Firm silent", "Supportive"],
["Consequence", "Second chance", "Eye contact", "Discuss"],
["Stop class", "Let it go", "Stare", "Redirect"],
["Structured", "Flexible", "Calm", "Interactive"],
["Push harder", "Encourage", "Observe", "Support"],
["Strict deadline", "Flexible", "Judgement", "Help"],
["Authority", "Calm", "Stare", "Fix"],
["Strict", "Flexible", "Implied", "Practical"],
["Call out", "Ignore", "Stare", "Refocus"],
["Enforce", "Peace", "Silent", "Solve"],
["Authority", "Mentor", "Observer", "Fixer"],
["Strict", "Kind", "Intimidating", "Helpful"],
["Critical", "Positive", "Minimal", "Constructive"],
["Punish", "Forgive", "Stare", "Guide"],
["Discipline", "Wellbeing", "Control", "Improvement"],
["Orderly", "Warm", "Quiet", "Supportive"],
["Rule follower", "Comfortable", "Quiet", "Improving"]
];

let index = 0;

let scores = {
  Enforcer: 0,
  Softie: 0,
  Stare: 0,
  Fixer: 0
};

function startQuiz(){
  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion(){
  if(index >= questions.length){
    showResult();
    return;
  }

  let html = `<h2>${questions[index]}</h2>`;

  ["A","B","C","D"].forEach((letter,i)=>{
    html += `<button onclick="choose('${letter}')">${letter}. ${options[index][i]}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function choose(letter){
  if(letter === "A") scores.Enforcer++;
  if(letter === "B") scores.Softie++;
  if(letter === "C") scores.Stare++;
  if(letter === "D") scores.Fixer++;

  index++;
  showQuestion();
}

function showResult(){
  let maxType = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  let results = {
    Enforcer: {
      title: "🚨 The Enforcer",
      description: "I got The Enforcer — apparently my classroom management style is clarity, boundaries, and absolutely no foolishness.",
      image: "enforcer.jpg"
    },
    Softie: {
      title: "💖 The Softie",
      description: "I got The Softie — supportive, forgiving, and one heartfelt apology away from abandoning my own boundaries.",
      image: "softie.jpg"
    },
    Stare: {
      title: "👀 The Stare",
      description: "I got The Stare — apparently my teaching style is eye contact, silence, and consequences that arrive spiritually.",
      image: "Stare.jpg"
    },
    Fixer: {
      title: "🛠️ The Fixer",
      description: "I got The Fixer — apparently my professional niche is rescuing collapsing lessons and making it look almost intentional.",
      image: "fixer.jpg"
    }
  };

  let r = results[maxType];

  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <img src="${r.image}" class="result-image">
      <h2>${r.title}</h2>
      <p>${r.description}</p>
    </div>
  `;
}

</script>

</body>
</html>
